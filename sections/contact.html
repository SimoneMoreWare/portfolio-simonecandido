<!-- ===== CONTACT SECTION ===== -->
<section class="contact" id="contact">
    <div class="section-header">
        <p class="label" data-en="Let's connect" data-it="Restiamo in contatto">Let's connect</p>
        <h2 data-en="Get In <span>Touch</span>" data-it="<span>Contattami</span>">Get In <span>Touch</span></h2>
    </div>
    <div class="contact-wrapper">
        <form id="contact-form">
            <input type="hidden" name="access_key" value="3015c7d9-97a1-4ccf-b5ce-e0371f62c225">
            <input type="checkbox" name="botcheck" style="display:none;">
            <div class="form-row">
                <div class="field"><input type="text" name="name" placeholder="Name" data-ph-en="Name" data-ph-it="Nome" required></div>
                <div class="field"><input type="email" name="email" placeholder="Email" required></div>
            </div>
            <div class="field"><input type="text" name="subject" placeholder="Subject" data-ph-en="Subject" data-ph-it="Oggetto"></div>
            <div class="field"><textarea name="message" placeholder="Your message..." data-ph-en="Your message..." data-ph-it="Il tuo messaggio..." required></textarea></div>
            <button type="submit" class="btn-primary" style="align-self:flex-end;">
                <span data-en="Send Message" data-it="Invia Messaggio">Send Message</span>
                <i class="fas fa-paper-plane"></i>
            </button>
        </form>
    </div>
</section>
